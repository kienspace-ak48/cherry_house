<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO shell — Express thay __PLACEHOLDER__ từ DB trước khi trả HTML (Zalo/FB không chạy JS).
         Trình duyệt: React PageSeo cập nhật meta khi navigate client-side. -->
    <title>__TITLE__</title>
    <meta name="description" content="__DESCRIPTION__" />
    <meta name="keywords" content="__KEYWORDS__" />
    <meta name="robots" content="__ROBOTS__" />
    <link rel="canonical" href="__CANONICAL__" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="__SITE_NAME__" />
    <meta property="og:title" content="__TITLE__" />
    <meta property="og:description" content="__DESCRIPTION__" />
    <meta property="og:url" content="__CANONICAL__" />
    <meta property="og:locale" content="vi_VN" />
    <meta property="og:image" content="__OG_IMAGE__" />
    <meta property="og:image:secure_url" content="__OG_IMAGE_SECURE__" />
    <meta property="og:image:type" content="__OG_IMAGE_TYPE__" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="__TWITTER_SITE__" />
    <meta name="twitter:title" content="__TITLE__" />
    <meta name="twitter:description" content="__DESCRIPTION__" />
    <meta name="twitter:image" content="__OG_IMAGE__" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,400;0,500;0,600;0,700;0,800;1,700&family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
